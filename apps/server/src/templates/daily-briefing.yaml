name: daily-briefing
description: Every morning, summarize yesterday's deck activity into a fresh inbox capture
trigger:
  - cron: "0 7 * * *"
  - webhook:
      path: /hooks/daily-briefing-manual
      secret_env: BRIEFING_SECRET
concurrency: skip
timezone: America/Chicago
budget:
  max_duration_secs: 120
  max_llm_cost_usd: 0.05
state:
  declared_keys: [last_briefing_date]
tags: [daily, morning, briefing]

steps:
  - id: should_run
    type: transform
    body: |
      const today = new Date().toISOString().slice(0, 10);
      return context.state.last_briefing_date !== today;

  - id: fetch_tasks
    type: http
    when: steps.should_run.json === true
    method: GET
    url: http://127.0.0.1:8787/api/tasks
    expect_json: true
    timeout_secs: 15
    on_failure: abort

  - id: fetch_inbox
    type: http
    when: steps.should_run.json === true
    method: GET
    url: http://127.0.0.1:8787/api/inbox
    expect_json: true
    timeout_secs: 15
    on_failure: abort

  # Pre-digest. The raw /api/tasks payload can be 30KB+ on a busy deck which
  # blows the agent step's prompt budget; this distills the data to a slim
  # summary the LLM can chew on without drowning in JSON.
  - id: digest
    type: transform
    when: steps.should_run.json === true
    body: |
      const tasks = context.steps.fetch_tasks.json.tasks || [];
      const inbox = context.steps.fetch_inbox.json.items || context.steps.fetch_inbox.json || [];
      const stateById = {};
      for (const s of (context.steps.fetch_tasks.json.states || [])) stateById[s.id] = s.name;
      const since = Date.now() - 24 * 60 * 60 * 1000;
      const recent = tasks.filter(t => new Date(t.updatedAt).getTime() >= since);
      const completed = recent.filter(t => stateById[t.stateId] === 'done').map(t => ({ id: 'T-' + t.displayId, title: t.title }));
      const active = tasks.filter(t => stateById[t.stateId] === 'active').slice(0, 20).map(t => ({ id: 'T-' + t.displayId, title: t.title }));
      const blocked = tasks.filter(t => stateById[t.stateId] === 'blocked').map(t => ({ id: 'T-' + t.displayId, title: t.title }));
      const inboxArr = Array.isArray(inbox) ? inbox : (inbox.items || []);
      const freshInbox = inboxArr.filter(i => new Date(i.createdAt).getTime() >= since).slice(0, 15).map(i => ({ kind: i.kind, title: i.title }));
      return { completed, active, blocked, freshInbox };

  - id: write_briefing
    type: agent
    when: steps.should_run.json === true
    model: claude-sonnet-4-6
    timeout_secs: 90
    prompt: |
      Generate a morning briefing in markdown. Keep it tight - 6 to 10 bullets total.

      Yesterday's completed: {{ steps.digest.json.completed | json }}
      Active right now: {{ steps.digest.json.active | json }}
      Blocked: {{ steps.digest.json.blocked | json }}
      Fresh inbox: {{ steps.digest.json.freshInbox | json }}

      Structure exactly:

      ## What shipped yesterday
      <2-3 bullets of meaningful completions; skip section if nothing>

      ## In flight
      <2-3 bullets of active tasks worth surfacing; skip section if none worth flagging>

      ## Needs attention
      <inbox items or blocked tasks worth flagging; skip if empty>

      ## Top focus today
      <exactly 1 bullet - the one thing>

      Tone: direct, no fluff, no preamble. The user re-reads this in 30 seconds and knows what matters.
    on_failure: abort

  - id: write_to_inbox
    type: deck
    action: create_inbox_item
    when: steps.should_run.json === true
    kind: capture
    title: "Morning briefing - {{ run.date }}"
    source: routine:daily-briefing
    body: |
      # Morning briefing - {{ run.date }}

      {{ steps.write_briefing.stdout }}

      ---
      _Generated by routine `daily-briefing` run {{ run.id }}_

  - id: persist_state
    type: set_state
    when: steps.should_run.json === true
    state:
      last_briefing_date: "{{ run.date }}"
