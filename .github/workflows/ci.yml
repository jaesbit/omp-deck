name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a new push lands. Keeps the
# matrix from queueing duplicate work during rapid push sequences.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Cross-platform matrix: typecheck + test + web build ──────────────────
  #
  # All three OSes run the same gates against the same Bun version. Anything
  # that diverges per-platform belongs in the source, not here — the matrix
  # exists to catch divergence early.
  matrix:
    name: ${{ matrix.os }} · bun ${{ matrix.bun }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bun: ["1.3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: bun install (frozen)
        run: bun install --frozen-lockfile

      - name: typecheck (all workspaces)
        run: bun run typecheck

      - name: test (all workspaces)
        run: bun test

      - name: web build
        run: bun --cwd apps/web run build

  # ─── Linux container build + smoke test ───────────────────────────────────
  #
  # Verifies the Dockerfile builds end-to-end and the runtime starts. Two
  # real bugs were caught during local testing: workspace manifest list
  # mismatch (missing telegram bridge) and Alpine/musl incompatibility with
  # `@oh-my-pi/pi-natives` glibc-only prebuilt `.node` binaries. This job
  # makes sure neither regresses silently.
  docker:
    name: docker build + boot smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: docker build
        run: docker build -t omp-deck:ci .

      - name: boot + /api/health
        run: |
          set -euo pipefail
          docker run -d --name omp-deck-ci -p 127.0.0.1:8787:8787 omp-deck:ci
          # Wait up to ~30s for the server to bind. Crash-loop containers
          # exit before then; we surface logs either way.
          for i in $(seq 1 30); do
            if curl -fs http://127.0.0.1:8787/api/health > /dev/null 2>&1; then
              echo "health endpoint up after ${i}s"
              break
            fi
            if [ "$(docker inspect -f '{{.State.Status}}' omp-deck-ci)" != "running" ]; then
              echo "container exited before health responded"
              break
            fi
            sleep 1
          done
          echo "=== container status ==="
          docker ps -a --filter name=omp-deck-ci
          echo "=== container logs ==="
          docker logs omp-deck-ci
          echo "=== /api/health ==="
          curl -fs http://127.0.0.1:8787/api/health
          echo
          echo "=== /api/tasks ==="
          curl -fs http://127.0.0.1:8787/api/tasks

      - name: cleanup
        if: always()
        run: docker rm -f omp-deck-ci 2>/dev/null || true
